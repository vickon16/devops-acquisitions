name: Lint and Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier Formatting
        run: |
          if ! npm run format:check; then
            echo "::error title=Formatting Issues::Prettier check failed. Please run 'npm run format' to fix all formatting issues."
            echo "FORMAT_FAILED=true" >> $GITHUB_ENV
          fi

      - name: Run ESLint
        run: |
          if ! npm run lint; then
            echo "::error title=Linting Issues::ESLint found issues. Please run 'npm run lint:fix' to automatically fix most linting issues."
            echo "LINT_FAILED=true" >> $GITHUB_ENV
          fi

      - name: Enforce Check Results
        run: |
          if [ "$FORMAT_FAILED" == "true" ] || [ "$LINT_FAILED" == "true" ]; then
            echo "Failing the workflow because linting or formatting checks failed."
            exit 1
          fi
