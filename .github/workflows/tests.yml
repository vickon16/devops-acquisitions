name: Tests

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        id: test
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: |
          if ! npm test -- --coverage; then
            echo "::error title=Tests Failed::One or more tests failed to pass. Please review the output to resolve the errors."
            echo "TEST_FAILED=true" >> $GITHUB_ENV
          fi

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Generate Step Summary
        if: always()
        run: |
          echo "## Test Results Summary 🚀" >> $GITHUB_STEP_SUMMARY
          if [ "$TEST_FAILED" == "true" ]; then
            echo "❌ **Failures detected**: Please review the test annotations or workflow logs for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **All tests successfully passed!**" >> $GITHUB_STEP_SUMMARY
          fi
